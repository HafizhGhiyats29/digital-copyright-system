services:
  api-gateway:
    build:
      context: ./api-gateway
    env_file:
      - .env
    environment:
      UPLOAD_SERVICE_URL: http://upload-service:8000
      FEATURE_EXTRACTION_SERVICE_URL: http://feature-extraction-service:8002
      WEB_SEARCH_SERVICE_URL: http://web-search-service:8001
      SIMILARITY_CHECK_SERVICE_URL: http://similarity-check-service:8003
      DECISION_ENGINE_URL: http://decision-engine:8005
      COPYRIGHT_METADATA_SERVICE_URL: http://copyright-metadata-service:8006
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-*}
    ports:
      - "8080:8080"
    depends_on:
      - upload-service
      - web-search-service
      - feature-extraction-service
      - similarity-check-service
      - decision-engine
      - copyright-metadata-service
    networks:
      - digital-copyright-network

  upload-service:
    build:
      context: ./upload-service
    env_file:
      - .env
    environment:
      FEATURE_SERVICE_URL: http://feature-extraction-service:8002/extract
      WEB_SEARCH_SERVICE_URL: http://web-search-service:8001/search
      SIMILARITY_SERVICE_URL: http://similarity-check-service:8003/similarity
      DECISION_SERVICE_URL: http://decision-engine:8005/decision
      METADATA_SERVICE_URL: http://copyright-metadata-service:8006/metadata
      EMBEDDING_SERVICE_URL: http://similarity-check-service:8003/embeddings
    depends_on:
      - feature-extraction-service
      - web-search-service
      - similarity-check-service
      - decision-engine
      - copyright-metadata-service
    networks:
      - digital-copyright-network

  web-search-service:
    build:
      context: ./web-search-service
    env_file:
      - .env
    environment:
      FEATURE_SERVICE_URL: http://feature-extraction-service:8002/extract
    depends_on:
      - feature-extraction-service
    networks:
      - digital-copyright-network

  feature-extraction-service:
    build:
      context: ./feature-extraction-service
    env_file:
      - .env
    networks:
      - digital-copyright-network

  similarity-check-service:
    build:
      context: ./similarity-check-service
    env_file:
      - .env
    environment:
      MILVUS_HOST: milvus-standalone
      MILVUS_PORT: "19530"
      METADATA_SERVICE_URL: http://copyright-metadata-service:8006/metadata
      FEATURE_SERVICE_URL: http://feature-extraction-service:8002/extract
    depends_on:
      - milvus-standalone
      - copyright-metadata-service
    networks:
      - digital-copyright-network

  decision-engine:
    build:
      context: ./decision-engine
    env_file:
      - .env
    networks:
      - digital-copyright-network

  copyright-metadata-service:
    build:
      context: ./copyright-metadata-service
    env_file:
      - .env
    environment:
      METADATA_STORAGE_TYPE: mongodb
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DATABASE: digital_copyright
      MONGODB_COLLECTION: copyright_metadata
    depends_on:
      - mongodb
    networks:
      - digital-copyright-network

  mongodb:
    image: mongo:7
    container_name: digital-copyright-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - ./database/mongodb/data:/data/db
    environment:
      MONGO_INITDB_DATABASE: digital_copyright
    networks:
      - digital-copyright-network

  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.25
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - ./database/milvus/volumes/etcd:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - digital-copyright-network

  milvus-minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    environment:
      MINIO_ROOT_USER: ${MILVUS_MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MILVUS_MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9001:9001"
      - "9000:9000"
    volumes:
      - ./database/milvus/volumes/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - digital-copyright-network

  milvus-standalone:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.6.15
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
      MINIO_ACCESS_KEY: ${MILVUS_MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MILVUS_MINIO_SECRET_KEY:-minioadmin}
      MQ_TYPE: woodpecker
    volumes:
      - ./database/milvus/volumes/milvus:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - milvus-minio
    networks:
      - digital-copyright-network

networks:
  digital-copyright-network:
    name: digital-copyright-network
