services:
  mongodb:
    image: mongo:7
    container_name: digital-copyright-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - ./database/mongodb/data:/data/db
    environment:
      MONGO_INITDB_DATABASE: digital_copyright
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  etcd:
    image: quay.io/coreos/etcd:v3.5.25
    container_name: milvus-etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - ./database/milvus/volumes/etcd:/etcd
    command: >
      etcd
      -advertise-client-urls=http://etcd:2379
      -listen-client-urls http://0.0.0.0:2379
      --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: milvus-minio
    restart: unless-stopped
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./database/milvus/volumes/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    image: milvusdb/milvus:v2.6.15
    container_name: milvus-standalone
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MQ_TYPE: woodpecker
    volumes:
      - ./database/milvus/volumes/milvus:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3

  milvus-init:
    build:
      context: ./similarity-check-service
    container_name: digital-copyright-milvus-init
    environment:
      MILVUS_HOST: milvus
      MILVUS_PORT: "19530"
      MILVUS_COLLECTION_NAME: copyright_embeddings
    command: ["python", "scripts/create_milvus_collection.py"]
    depends_on:
      milvus:
        condition: service_healthy
    restart: "no"

  feature-extraction-service:
    build:
      context: ./feature-extraction-service
    container_name: digital-copyright-feature-extraction-service
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      MODEL_DEVICE: ${MODEL_DEVICE:-cpu}
      CLIP_MODEL_NAME: ${CLIP_MODEL_NAME:-openai/clip-vit-base-patch32}
      HF_HOME: /models/huggingface
      TORCH_HOME: /models/torch
    volumes:
      - model-cache:/models
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/health', timeout=5)\""]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 120s

  copyright-metadata-service:
    build:
      context: ./copyright-metadata-service
    container_name: digital-copyright-metadata-service
    restart: unless-stopped
    ports:
      - "8006:8006"
    environment:
      METADATA_STORAGE_TYPE: mongodb
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DATABASE: digital_copyright
      MONGODB_COLLECTION: copyright_metadata
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8006/health', timeout=5)\""]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 20s

  similarity-check-service:
    build:
      context: ./similarity-check-service
    container_name: digital-copyright-similarity-check-service
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      MILVUS_HOST: milvus
      MILVUS_PORT: "19530"
      MILVUS_COLLECTION_NAME: copyright_embeddings
      FEATURE_SERVICE_URL: http://feature-extraction-service:8002/extract
      METADATA_SERVICE_URL: http://copyright-metadata-service:8006/metadata
    depends_on:
      milvus-init:
        condition: service_completed_successfully
      milvus:
        condition: service_healthy
      copyright-metadata-service:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8003/health', timeout=5)\""]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 20s

  milvus-seed-internal-images:
    build:
      context: ./similarity-check-service
    container_name: digital-copyright-milvus-seed-internal-images
    profiles:
      - tools
    environment:
      MILVUS_HOST: milvus
      MILVUS_PORT: "19530"
      MILVUS_COLLECTION_NAME: copyright_embeddings
      FEATURE_SERVICE_URL: http://feature-extraction-service:8002/extract
    volumes:
      - ./database/internal_images:/database/internal_images:ro
    command: ["python", "scripts/insert_internal_images.py"]
    depends_on:
      milvus-init:
        condition: service_completed_successfully
      feature-extraction-service:
        condition: service_started
    restart: "no"

  decision-engine:
    build:
      context: ./decision-engine
    container_name: digital-copyright-decision-engine
    restart: unless-stopped
    ports:
      - "8005:8005"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8005/health', timeout=5)\""]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 20s

  web-search-service:
    build:
      context: ./web-search-service
    container_name: digital-copyright-web-search-service
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      FEATURE_SERVICE_URL: http://feature-extraction-service:8002/extract
      SERPAPI_KEY: ${SERPAPI_KEY:-}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
    depends_on:
      feature-extraction-service:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=5)\""]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 20s

  upload-service:
    build:
      context: ./upload-service
    container_name: digital-copyright-upload-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      FEATURE_SERVICE_URL: http://feature-extraction-service:8002/extract
      WEB_SEARCH_SERVICE_URL: http://web-search-service:8001/search
      SIMILARITY_SERVICE_URL: http://similarity-check-service:8003/similarity
      DECISION_SERVICE_URL: http://decision-engine:8005/decision
      METADATA_SERVICE_URL: http://copyright-metadata-service:8006/metadata
      EMBEDDING_SERVICE_URL: http://similarity-check-service:8003/embeddings
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      CLOUDINARY_FOLDER: ${CLOUDINARY_FOLDER:-copyright-registrations}
    depends_on:
      feature-extraction-service:
        condition: service_started
      web-search-service:
        condition: service_started
      similarity-check-service:
        condition: service_started
      decision-engine:
        condition: service_started
      copyright-metadata-service:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)\""]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 20s

  api-gateway:
    build:
      context: ./api-gateway
    container_name: digital-copyright-api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      UPLOAD_SERVICE_URL: http://upload-service:8000
      FEATURE_EXTRACTION_SERVICE_URL: http://feature-extraction-service:8002
      WEB_SEARCH_SERVICE_URL: http://web-search-service:8001
      SIMILARITY_CHECK_SERVICE_URL: http://similarity-check-service:8003
      DECISION_ENGINE_URL: http://decision-engine:8005
      COPYRIGHT_METADATA_SERVICE_URL: http://copyright-metadata-service:8006
    depends_on:
      upload-service:
        condition: service_started
      feature-extraction-service:
        condition: service_started
      web-search-service:
        condition: service_started
      similarity-check-service:
        condition: service_started
      decision-engine:
        condition: service_started
      copyright-metadata-service:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=5)\""]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 20s

volumes:
  model-cache:
